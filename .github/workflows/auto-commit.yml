name: Auto Commit to README

on:
  schedule:
    - cron: '0 9 * * *'   # Runs every day at 9:00 AM UTC
  workflow_dispatch:        # Also allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out your repo
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Run your script
      - name: Update README
        run: python update_readme.py

      # Step 4: Commit and push
      - name: Commit and Push Changes
        run: |
          git config --global user.email "hadiyal.samir26@gmail.com"
          git config --global user.name "Auto Bot"
          git add README.md
          git diff --staged --quiet || git commit -m "🟩 Daily auto-update: $(date +'%Y-%m-%d')"
          git push
